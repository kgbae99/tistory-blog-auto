# IT/가젯 리뷰 블로그 설정 - uyoblog
blog:
  name: "테크온도(IT++)"
  url: "https://uyoblog.tistory.com"
  blog_name: "uyoblog"
  categories:
    - name: "노트북/PC"
      subcategories:
        - "노트북 추천"
        - "조립PC 가이드"
    - name: "스마트폰/태블릿"
      subcategories:
        - "스마트폰 비교"
        - "태블릿 추천"
    - name: "가젯/악세서리"
      subcategories:
        - "이어폰/헤드폰"
        - "키보드/마우스"
        - "충전기/케이블"
    - name: "가전/생활가전"
      subcategories:
        - "공기청정기"
        - "로봇청소기"
        - "모니터"
    - name: "IT 꿀팁"
      subcategories:
        - "앱 추천"
        - "설정 가이드"

content:
  model: "gpt-5-mini"
  max_tokens: 4096
  min_word_count: 1500
  max_word_count: 3000
  language: "ko"
  tone: "친근하고 전문적인"
  target_audience: "IT 제품에 관심 있는 20~50대"

seo:
  min_headings: 5
  max_headings: 8
  meta_description_length: 155
  focus_keywords_per_post: 3
  internal_links_per_post: 2
  schema_types:
    - Article
    - FAQPage
    - Product

coupang:
  products_per_post: 3
  categories:
    - 노트북
    - 이어폰
    - 키보드
    - 마우스
    - 모니터
    - 충전기
    - 태블릿
    - 스마트워치
    - 공기청정기
    - 로봇청소기

